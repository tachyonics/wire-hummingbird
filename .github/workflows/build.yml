name: build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Linux-only (Docker containers), matching task-cluster. macOS is intentionally
# not built: a transitive dependency (swift-configuration, via swift-wire) doesn't
# compile against Darwin Foundation, and Linux is the deployment target.

jobs:
  BuildAndEndToEnd:
    runs-on: ubuntu-latest
    container:
      image: swift:6.3.3
    steps:
      - name: Install dependencies
        run: apt-get update && apt-get install -y curl unzip libssl-dev
      - uses: actions/checkout@v7
      - name: Build
        run: swift build -c release -Xswiftc -strict-concurrency=complete
      - name: Run end-to-end example
        # Bootstraps the graph via the build plugin, applies the collated routes to a
        # Router, and serves a request in-process via HummingbirdTesting's
        # app.test(.router). Prints "wire-hummingbird OK" or traps (precondition).
        run: swift run WireHummingbirdExample
      - name: Build (verbose, for SwiftLint analyze)
        run: swift build -v > build.log 2>&1
      - name: Install SwiftLint
        run: |
          curl -sL https://github.com/realm/SwiftLint/releases/download/0.63.2/swiftlint_linux_amd64.zip -o swiftlint.zip
          unzip -o swiftlint.zip -d /usr/local/bin
          chmod +x /usr/local/bin/swiftlint
      - name: SwiftLint analyze (unused imports)
        run: swiftlint analyze --strict --quiet --compiler-log-path build.log
      - name: SwiftLint
        run: swiftlint lint --quiet

  SwiftFormat:
    runs-on: ubuntu-latest
    container:
      image: swift:6.3.3
    steps:
      - uses: actions/checkout@v7
      - name: Run swift-format
        run: swift-format format --recursive --in-place .
      - name: Check for formatting differences
        run: |
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          git diff --exit-code
